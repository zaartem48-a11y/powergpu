<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PowerGPU</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <div class="header-container">
            <div class="logo-title" onclick="showProducts()">
                <img src="logo/VCard.png" alt="Логотип" class="logo">
                <h1>PowerGPU</h1>
            </div>
            <div class="header-buttons">
                <button onclick="showProfile()">Профиль</button> <button id="cart-button" onclick="toggleCart()">Корзина (<span id="cart-count">0</span>)</button>
            </div>
        </div>
    </header>

    <div class="main-container">
        <div class="controls" id="main-controls">
            <div class="filter-group">
                <span style="color: #22c55e; font-weight: bold; margin-right: 10px;">Цена (₽):</span>
            <div class="price-inputs">
                <input type="number" id="price-min" placeholder="От" oninput="filterProducts()" min="0">
                <input type="number" id="price-max" placeholder="До" oninput="filterProducts()" min="0">
            </div>
            </div>
    <div class="search-container">
        <input type="text" id="search-input" placeholder="Поиск видеокарт..." onkeyup="filterProducts()">
    </div>
    
    <div class="filter-group">
        <span style="color: #22c55e; font-weight: bold; margin-right: 10px;">Бренд:</span>
        <div class="filter-buttons" id="brand-buttons">
            <button class="filter-btn active" onclick="setFilter('ALL')">Все</button>
            <button class="filter-btn" onclick="setFilter('NVIDIA')">NVIDIA</button>
            <button class="filter-btn" onclick="setFilter('AMD')">AMD</button>
        </div>
    </div>

    <div class="filter-group">
        <span style="color: #22c55e; font-weight: bold; margin-right: 10px;">Производитель:</span>
        <div class="filter-buttons" id="vendor-buttons">
            <button class="filter-btn active" onclick="setVendorFilter('ALL')">Все</button>
            <button class="filter-btn" onclick="setVendorFilter('ASUS')">ASUS</button>
            <button class="filter-btn" onclick="setVendorFilter('Gigabyte')">Gigabyte</button>
            <button class="filter-btn" onclick="setVendorFilter('MSI')">MSI</button>
            <button class="filter-btn" onclick="setVendorFilter('Palit')">Palit</button>
            <button class="filter-btn" onclick="setVendorFilter('Sapphire')">Sapphire</button>
            <button class="filter-btn" onclick="setVendorFilter('KFA2')">KFA2</button>
            <button class="filter-btn" onclick="setVendorFilter('GALAX')">GALAX</button>
            <button class="filter-btn" onclick="setVendorFilter('ASRock')">ASRock</button>
        </div>
    </div>

    <div class="memory-filter">
        <span style="color: #22c55e; font-weight: bold; margin-right: 10px;">Память:</span>
        <div class="filter-buttons" id="memory-buttons">
            <button class="filter-btn active" onclick="setMemoryFilter('ALL')">Все</button>
            <button class="filter-btn" onclick="setMemoryFilter('8GB')">8GB</button>
            <button class="filter-btn" onclick="setMemoryFilter('12GB')">12GB</button>
            <button class="filter-btn" onclick="setMemoryFilter('16GB')">16GB</button>
            <button class="filter-btn" onclick="setMemoryFilter('20GB')">20GB</button>
            <button class="filter-btn" onclick="setMemoryFilter('24GB')">24GB</button>
        </div>
    </div>
</div>

        <div id="product-grid" class="product-grid"></div>
        <div id="profile-view" class="profile-view hidden">
        <div class="profile-header">
            <button class="filter-btn" onclick="showProducts()">← Назад к товарам</button>
        </div>
        <div id="profile-info"></div>
        </div>

        <div id="cart-view" class="cart-view hidden">
            <div class="cart-header">
                <h2>Ваша корзина</h2>
                <button class="filter-btn" onclick="showProducts()">Вернуться к покупкам</button>
            </div>
            <div id="empty-cart" class="empty-cart"><p>В корзине пока ничего нет</p></div>
            <div id="cart-items"></div>
            <div id="cart-total" class="cart-total hidden">
                <h3>Итого: <span id="total-amount">0 ₽</span></h3>
                <button class="checkout-button" onclick="openOrderModal()">Оформить заказ</button>
            </div>
        </div>
    </div>

    <div id="product-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div id="modal-details"></div>
        </div>
    </div>

    <div id="order-modal" class="modal" style="display: none;">
    <div class="modal-content">
        <span class="close-modal" onclick="closeOrderModal()">&times;</span>
        <h2>Оформление заказа</h2>
        <form id="order-form" onsubmit="submitOrder(event)">
            <input type="text" id="order-city" placeholder="Город" required>
            <input type="text" id="order-street" placeholder="Улица" required>
            <div style="display: flex; gap: 10px;">
                <input type="text" id="order-house" placeholder="Дом" required>
                <input type="text" id="order-ent" placeholder="Подъезд">
                <input type="text" id="order-flat" placeholder="Кв.">
            </div>
            <button type="submit" class="checkout-button" style="margin-top: 15px;">Подтвердить заказ</button>
        </form>
    </div>
</div>

<div id="order-details-modal" class="modal" style="display: none;">
    <div class="modal-content">
        <span class="close-modal" onclick="closeOrderDetailsModal()">&times;</span>
        <div id="order-full-info"></div>
    </div>
</div>

    <script src="script.js"></script>
</body>
</html>
